<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <!-- Planet body gradient: deep blue to teal -->
    <radialGradient id="planetGrad" cx="40%" cy="35%" r="60%">
      <stop offset="0%"   stop-color="#a8d8ff"/>
      <stop offset="40%"  stop-color="#4a90d9"/>
      <stop offset="100%" stop-color="#1a3a6b"/>
    </radialGradient>

    <!-- Ring gradient -->
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#c8a45a" stop-opacity="0.3"/>
      <stop offset="25%"  stop-color="#e8c87a" stop-opacity="0.85"/>
      <stop offset="50%"  stop-color="#f5dfa0" stop-opacity="0.95"/>
      <stop offset="75%"  stop-color="#e8c87a" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#c8a45a" stop-opacity="0.3"/>
    </linearGradient>

    <!-- Shadow on planet from ring -->
    <radialGradient id="shadowGrad" cx="50%" cy="50%" r="50%">
      <stop offset="60%"  stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.25"/>
    </radialGradient>

    <clipPath id="planetClip">
      <circle cx="16" cy="16" r="11"/>
    </clipPath>
  </defs>

  <!-- ── Ring (back half, behind planet) ── -->
  <ellipse cx="16" cy="17.5" rx="15.5" ry="4.5"
           fill="none"
           stroke="url(#ringGrad)" stroke-width="3.5"
           stroke-dasharray="24.5 24.5"
           stroke-dashoffset="0"
           opacity="0.9"/>

  <!-- ── Planet body ── -->
  <circle cx="16" cy="16" r="11" fill="url(#planetGrad)"/>

  <!-- Surface bands (clipped to planet) -->
  <g clip-path="url(#planetClip)">
    <!-- Equatorial band -->
    <ellipse cx="16" cy="18" rx="13" ry="2.2" fill="#3a7abf" opacity="0.45"/>
    <!-- Northern band -->
    <ellipse cx="16" cy="12" rx="11" ry="1.4" fill="#5aaae0" opacity="0.3"/>
    <!-- Southern band -->
    <ellipse cx="16" cy="23" rx="10" ry="1.2" fill="#2a5a9f" opacity="0.35"/>

    <!-- Swirl / storm spot -->
    <ellipse cx="11" cy="17" rx="2.8" ry="1.8" fill="#6ab4f0" opacity="0.45" transform="rotate(-15 11 17)"/>
    <ellipse cx="11" cy="17" rx="1.4" ry="0.9" fill="#a8d8ff" opacity="0.5" transform="rotate(-15 11 17)"/>

    <!-- Highlight gloss -->
    <ellipse cx="12" cy="11" rx="4.5" ry="2.8" fill="white" opacity="0.15" transform="rotate(-20 12 11)"/>

    <!-- Edge shadow for depth -->
    <circle cx="16" cy="16" r="11" fill="url(#shadowGrad)"/>
  </g>

  <!-- ── Ring (front half, over planet) ── -->
  <ellipse cx="16" cy="17.5" rx="15.5" ry="4.5"
           fill="none"
           stroke="url(#ringGrad)" stroke-width="3.5"
           stroke-dasharray="24.5 24.5"
           stroke-dashoffset="24.5"
           opacity="0.95"/>
</svg>
