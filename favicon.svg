<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="1.2" flood-color="#00000033"/>
    </filter>
  </defs>

  <!-- Left ear -->
  <ellipse cx="8" cy="11" rx="5" ry="7" fill="#c8a165" transform="rotate(-15 8 11)" filter="url(#shadow)"/>
  <!-- Right ear -->
  <ellipse cx="24" cy="11" rx="5" ry="7" fill="#c8a165" transform="rotate(15 24 11)" filter="url(#shadow)"/>

  <!-- Head -->
  <circle cx="16" cy="17" r="13" fill="#e0b87a" filter="url(#shadow)"/>

  <!-- Inner left ear -->
  <ellipse cx="8.2" cy="11" rx="3" ry="5" fill="#e8936a" transform="rotate(-15 8.2 11)"/>
  <!-- Inner right ear -->
  <ellipse cx="23.8" cy="11" rx="3" ry="5" fill="#e8936a" transform="rotate(15 23.8 11)"/>

  <!-- Snout -->
  <ellipse cx="16" cy="21" rx="6" ry="4.5" fill="#f5d09a"/>

  <!-- Left eye -->
  <circle cx="12" cy="15" r="2.5" fill="#2d1a0e"/>
  <circle cx="12.8" cy="14.2" r="0.8" fill="white"/>

  <!-- Right eye -->
  <circle cx="20" cy="15" r="2.5" fill="#2d1a0e"/>
  <circle cx="20.8" cy="14.2" r="0.8" fill="white"/>

  <!-- Nose -->
  <ellipse cx="16" cy="19.5" rx="2.5" ry="1.6" fill="#2d1a0e"/>
  <ellipse cx="15.4" cy="19" rx="0.7" ry="0.45" fill="#5a3a2a" opacity="0.6"/>

  <!-- Mouth -->
  <path d="M13.5 22 Q16 24.5 18.5 22" stroke="#2d1a0e" stroke-width="1.2" stroke-linecap="round" fill="none"/>
  <!-- Tongue -->
  <ellipse cx="16" cy="24.2" rx="2" ry="1.5" fill="#f07090"/>
</svg>
