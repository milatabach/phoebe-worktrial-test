<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Drop shadow filter -->
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="1.2" flood-color="#00000033"/>
    </filter>
  </defs>

  <!-- Calculator body -->
  <rect x="4" y="3" width="24" height="27" rx="5" ry="5" fill="#4f46e5" filter="url(#shadow)"/>
  <!-- Shiny top highlight -->
  <rect x="4" y="3" width="24" height="10" rx="5" ry="5" fill="#6d66ff" opacity="0.45"/>

  <!-- Screen -->
  <rect x="7" y="6" width="18" height="9" rx="2.5" ry="2.5" fill="#ddd6fe"/>
  <!-- Smiley face on screen -->
  <!-- Eyes -->
  <circle cx="12" cy="9.8" r="1.3" fill="#4f46e5"/>
  <circle cx="20" cy="9.8" r="1.3" fill="#4f46e5"/>
  <!-- Smile -->
  <path d="M11.5 12.5 Q16 15.5 20.5 12.5" stroke="#4f46e5" stroke-width="1.4" stroke-linecap="round" fill="none"/>

  <!-- Button row 1 -->
  <rect x="7"  y="18" width="4" height="3.2" rx="1.2" fill="#ffb6c1"/>
  <rect x="12" y="18" width="4" height="3.2" rx="1.2" fill="#ffb6c1"/>
  <rect x="17" y="18" width="4" height="3.2" rx="1.2" fill="#ffb6c1"/>
  <rect x="22" y="18" width="3" height="3.2" rx="1.2" fill="#818cf8"/>

  <!-- Button row 2 -->
  <rect x="7"  y="22.5" width="4" height="3.2" rx="1.2" fill="#c7d2fe"/>
  <rect x="12" y="22.5" width="4" height="3.2" rx="1.2" fill="#c7d2fe"/>
  <rect x="17" y="22.5" width="4" height="3.2" rx="1.2" fill="#c7d2fe"/>
  <rect x="22" y="22.5" width="3" height="7" rx="1.2" fill="#818cf8"/>

  <!-- Button row 3 (wide zero) -->
  <rect x="7"  y="27" width="9" height="3.2" rx="1.2" fill="#c7d2fe"/>
  <rect x="17" y="27" width="4" height="3.2" rx="1.2" fill="#c7d2fe"/>
</svg>
